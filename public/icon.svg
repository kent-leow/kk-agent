<svg width="32" height="32" xmlns="http://www.w3.org/2000/svg">
  <!-- Arc Raiders style AI agent icon -->
  <defs>
    <linearGradient id="radar" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b91c1c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Radar background -->
  <circle cx="16" cy="16" r="15" fill="#1f2937" stroke="#dc2626" stroke-width="2"/>
  
  <!-- Radar sweep -->
  <path d="M16 1 L24 8 L24 16" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Target dot -->
  <circle cx="16" cy="16" r="2" fill="#fbbf24"/>
  
  <!-- Crosshairs -->
  <line x1="16" y1="3" x2="16" y2="29" stroke="#ef4444" stroke-width="1"/>
  <line x1="3" y1="16" x2="29" y2="16" stroke="#ef4444" stroke-width="1"/>
  
  <!-- AI emblem -->
  <circle cx="16" cy="16" r="10" fill="none" stroke="#fbbf24" stroke-width="2"/>
  <circle cx="16" cy="16" r="6" fill="none" stroke="#fbbf24" stroke-width="1" stroke-dasharray="2,2"/>
</svg>
